<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Free Water Site</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&display=swap" rel="stylesheet">
</head>
<body>
     <div id="logoContainer">
        <img src="images/Free-water-site-logo.png" alt="Logo" id="logo">
    </div>
    <div id="searchContainer">
        <input type="text" id="searchInput" placeholder="Enter a location..." autocomplete="off">
        <button id="searchButton">Search</button>
        <div id="autocompleteResults"></div>
        <button id="searchAreaButton" style="display:none;">Search this area</button>
        <div id="loader" class="loader" style="display: none;"></div>
    </div>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
    <script src="scripts.js"></script>
</body>
</html>
